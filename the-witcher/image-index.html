<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Witcher Image Index | Mouseia</title>
  <meta name="description" content="A searchable image gallery for The Witcher stills, promotional images, episode images, and production photos.">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <link rel="canonical" href="https://mouseia.com/the-witcher/image-index.html">
  
  
  <style>
    :root {
      color-scheme: dark;
      --bg: #171719;
      --panel: #242329;
      --text: #f6f1ea;
      --muted: #bcb4aa;
      --line: rgba(255, 255, 255, 0.14);
      --accent: #d4b06a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    a {
      color: inherit;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem clamp(1rem, 4vw, 3rem);
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.9rem;
    }

    main {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: clamp(1.25rem, 4vw, 3rem);
    }

    h1 {
      margin: 0;
      font-size: 3rem;
      line-height: 1.05;
    }

    .intro {
      max-width: 760px;
      margin: 0.75rem 0 1.5rem;
      color: var(--muted);
    }

    .pagination {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }

    .pagination a,
    .pagination span {
      min-width: 2.25rem;
      padding: 0.45rem 0.7rem;
      border: 1px solid var(--line);
      text-align: center;
      text-decoration: none;
    }

    .pagination span {
      border-color: var(--accent);
      color: var(--accent);
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 1rem;
    }

    figure {
      margin: 0;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    figure a {
      display: block;
      aspect-ratio: 4 / 3;
      background: #0d0d0f;
      overflow: hidden;
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    figcaption {
      padding: 0.75rem;
      font-size: 0.82rem;
    }

    figcaption strong,
    figcaption span {
      display: block;
      overflow-wrap: anywhere;
    }

    figcaption span {
      margin-top: 0.4rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 2.1rem;
      }

      .image-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
