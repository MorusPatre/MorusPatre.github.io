<!DOCTYPE HTML>
<html lang="en">
    <head>
        <title>The Witcher Image Gallery | Mouseia</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <meta name="description" content="Search The Witcher image gallery for stills, promotional images, episode images, characters, cast, and production photos.">
        <meta name="robots" content="index, follow, max-image-preview:large">
        <link rel="canonical" href="https://mouseia.com/the-witcher/">
        <link rel="sitemap" type="application/xml" href="/sitemap.xml">
        <meta property="og:site_name" content="Mouseia">
        <meta property="og:title" content="The Witcher Image Gallery">
        <meta property="og:description" content="Search The Witcher stills, promotional images, episode images, characters, cast, and production photos.">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://mouseia.com/the-witcher/">
        <meta property="og:image" content="https://mouseia.com/images/witcher-promo.webp">
        <meta name="twitter:card" content="summary_large_image">
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "CollectionPage",
                "name": "The Witcher Image Gallery",
                "description": "Search The Witcher image gallery for stills, promotional images, episode images, characters, cast, and production photos.",
                "url": "https://mouseia.com/the-witcher/",
                "image": "https://mouseia.com/images/witcher-promo.webp",
                "isPartOf": {
                    "@type": "WebSite",
                    "name": "Mouseia",
                    "url": "https://mouseia.com/"
                }
            }
        </script>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

        <link rel="stylesheet" href="assets/css/main.css" />
        <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    </head>
    <body>
        <div id="loader-wrapper">
            <div class="loader"></div>
        </div>

        <div id="wrapper">
            <header id="header">
                <div class="logo">
                    <img src="images/witcher_wolf.png" alt="Witcher Wolf Medallion" draggable="false" />
                </div>
                <div id="search-container">
                    <form onsubmit="return false;">
                        <span class="search-icon"></span>
                        <input type="text" id="search-input" placeholder="Search by filename, character, actor, episode, season etc..." autocomplete="off">
                        <span id="clear-search" class="clear-search-button">&times;</span>
                        <div id="suggestions-container"></div>
                    </form>
                </div>
            </header>

            <div id="photo-gallery"
                 data-gallery-json="gallery-data.json"
                 data-gallery-id="the-witcher">
                <div id="marquee"></div>
            </div>

            <footer id="footer">
                <p class="copyright">&copy; The Witcher, 2019 Netflix. All Rights Reserved. <a href="/the-witcher/image-index.html">Image Index</a></p>
            </footer>
        </div>

        <div id="bg"></div>

        <script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/browser.min.js"></script>
        <script src="assets/js/breakpoints.min.js"></script>
        <script src="assets/js/util.js"></script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

        <script src="assets/js/main.js"></script>
        <script src="assets/js/gallery-loader.js"></script>

        <div id="image-modal" class="modal-overlay">
            <span class="modal-close">&times;</span>
            <span class="modal-prev">&#10094;</span>
            <span class="modal-next">&#10095;</span>
            <div class="modal-content">
                <div class="modal-image-container">
                    <img id="modal-img" src="" alt="Enlarged image">
                </div>
                <div class="modal-info-panel">
                    <div class="info-content">
                        <h3 id="modal-filename"></h3>
                        <div id="modal-metadata">
                        </div>
                    </div>
                    <a id="modal-download-btn" class="button download-btn" download><i class="fas fa-download"></i> Download</a>
                </div>
            </div>
        </div>

        <div id="custom-context-menu" class="context-menu">
            <ul>
                <li id="context-menu-open">Open</li>
                <li id="context-menu-open-tab">Open Image in New Tab</li>
                <li class="separator"></li>
                <li id="context-menu-save">Save Image to "Downloads"</li>
            </ul>
        </div>

        <div id="gallery-context-menu" class="context-menu">
            <ul>
                <li id="gallery-context-add">Add Images</li>
                <li class="separator"></li>
                <li id="gallery-context-sort">Sort By</li>
                <li id="gallery-context-view">Show View Options</li>
            </ul>
        </div>

        <div id="custom-scrollbar-track">
            <div id="custom-scrollbar-thumb"></div>
        </div>
    </body>
</html>
